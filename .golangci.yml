run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gosimple
    - gofmt
    - goimports

linters-settings:
  goimports:
    local-prefixes: SignalIngressBroker

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
